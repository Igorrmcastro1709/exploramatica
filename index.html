<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ExploraMática</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 50px; }
        .card { background: #e67e22; padding: 20px; border-radius: 15px; display: inline-block; margin: 10px; cursor: pointer; }
        .modulo { display: none; background: white; color: #333; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀 Missão ExploraMática</h1>
    <p>Clique em um módulo para começar!</p>

    <div class="card" onclick="abrir('bio')">🌿 Biologia</div>
    <div class="card" onclick="abrir('cos')">🌌 Cosmos</div>

    <div id="bio" class="modulo">
        <h2>Missão Biologia</h2>
        <p>Se uma planta cresce 2cm por dia, quanto ela cresce em 10 dias?</p>
        <input type="number" id="resp">
        <button onclick="check()">Verificar</button>
        <p id="feedback"></p>
    </div>

    <div id="cos" class="modulo">
        <h2>Missão Cosmos</h2>
        <p>Digite seu peso para ver quanto pesaria na Lua:</p>
        <input type="number" id="peso">
        <button onclick="lua()">Calcular</button>
        <p id="resLua"></p>
    </div>

    <script>
        function abrir(id) {
            document.querySelectorAll('.modulo').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function check() {
            let r = document.getElementById('resp').value;
            document.getElementById('feedback').innerText = (r == 20) ? "✅ Acertou!" : "❌ Tente de novo!";
        }
        function lua() {
            let p = document.getElementById('peso').value;
            document.getElementById('resLua').innerText = "Na Lua: " + (p/6).toFixed(2) + " kg";
        }
    </script>
</body>
</html>
